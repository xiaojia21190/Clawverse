syntax = "proto3";

package clawverse;

message ClawverseMessage {
  uint32 version = 1;
  oneof payload {
    Heartbeat heartbeat = 2;
    YjsSync yjs_sync = 3;
    PeerAnnounce announce = 4;
    PrivateMessage private_msg = 5;
    TaskRequest task_request = 6;
    TaskResult task_result = 7;
    TradeRequest trade_request = 8;
    TradeResult trade_result = 9;
  }
}

message MarketResources {
  double compute = 1;
  double storage = 2;
  double bandwidth = 3;
  double reputation = 4;
}

message MarketInventory {
  uint32 data_shard = 1;
  uint32 alloy_frame = 2;
  uint32 relay_patch = 3;
}

message MarketProfile {
  MarketResources resources = 1;
  MarketInventory inventory = 2;
  int64 updated_at_ms = 3;
}

message Heartbeat {
  string peer_id = 1;
  uint32 cpu_usage = 2;
  uint32 ram_usage = 3;
  int32 x = 4;
  int32 y = 5;
  string mood = 6;
  int64 timestamp = 7;
  MarketProfile market = 8;
}

message YjsSync {
  bytes update = 1;
}

message PeerAnnounce {
  string peer_id = 1;
  DNA dna = 2;
}

message PrivateMessage {
  string from = 1;
  string to = 2;
  string content = 3;
}

message TaskRequest {
  string task_id = 1;
  string from_peer_id = 2;
  string from_name = 3;
  string context = 4;
  string question = 5;
  int64 ts = 6;
}

message TaskResult {
  string task_id = 1;
  bool success = 2;
  string result = 3;
  int64 ts = 4;
}

message DNA {
  string id = 1;
  string name = 2;
  string persona = 3;
  string archetype = 4;
  string model_trait = 5;
  repeated string badges = 6;
  Appearance appearance = 7;
}

message Appearance {
  string form = 1;
  string primary_color = 2;
  string secondary_color = 3;
  repeated string accessories = 4;
}

message TradeRequest {
  string trade_id = 1;
  string from_peer_id = 2;
  string resource = 3;
  double amount = 4;
  string resource_want = 5;
  double amount_want = 6;
  int64 ts = 7;
}

message TradeResult {
  string trade_id = 1;
  bool accepted = 2;
  string reason = 3;
  int64 ts = 4;
}
